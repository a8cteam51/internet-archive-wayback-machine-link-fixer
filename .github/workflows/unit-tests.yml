name: WP PHPUnit Tests

on:
  push:
    branches: [ trunk ]
  pull_request:
    branches: [ trunk, develop ]

jobs:
  build:
    strategy:
      matrix:
        operating-system: [ubuntu-latest]
        include:
          - php: '7.4'
            mbstring: true
          - php: '8.0'
            mbstring: true
          - php: '8.1'
            mbstring: true
          - php: '8.2'
            mbstring: true
          - php: '8.3'
            mbstring: true
          - php: '8.3'
            mbstring: false  # This is the special case
          - php: '8.4'
            mbstring: true
    runs-on: ${{ matrix.operating-system }}
    services:
      # Setup MYSQL
      mysql-service:
        image: 'mysql:5.7'
        env:
          MYSQL_ROOT_PASSWORD: 'poetry'
          MYSQL_DATABASE: wlf_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4
       - name: Setup PHP ${{ matrix.php }} (mbstring = ${{ matrix.mbstring }})
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          extensions: ${{ matrix.mbstring && 'mbstring' || '' }}

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer run-script packages-install
      - name: Run Tests on Latest Version - WP6.8
        env:
          environment_github: true
        run: composer test:php

