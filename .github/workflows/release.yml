name: Create release

on:
  release:
    types:
      - created

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      # Set up PHP environment
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3 # Specify your PHP version
          tools: composer

      # Install DEV Deps, build i18n files
      - name: Run i18n Build
        run: |
          composer install --ignore-platform-reqs --no-interaction
          composer internationalize

      # Install production dependencies
      - name: Install Composer Dependencies
        run: composer install --ignore-platform-reqs --no-interaction --no-dev -o

      # Run NPM Install and build
      - name: Run NPM Install and Build
        run: |
          npm install
          npm run build

      # Zip the folder excluding unwanted files
      - name: Zip Folder
        run: |
          zip -r ${{ github.event.repository.name }}.zip . \
          -x "composer.lock" \
            "coverage/*" \
            "coverage-report/*" \
            ".editorconfig" \
            ".git/*" \
            ".github/*" \
            ".gitignore" \
            ".distignore" \
            "index.php" \
            "node_modules/*" \
            "models/*" \
            "package.json" \
            "package-lock.json" \
            ".phpcs.xml" \
            ".php-scoper.inc.php" \
            ".phpunit.result.cache" \
            "phpunit.xml.dist" \
            "postcss.config.js" \
            "tests/*" \
            ".vscode/*" \
            "assets/css/src/*" \
            "assets/js/src/*" \
            "_docs/*" \
            "README.md" \
            "AGENTS.md" \
            "CLAUDE.md" \
            "SECURITY.md" \
            ".agents/*" \
            "e2e/*" \
            ".wp-env.json" \
            "playwright-report/*" \
            "test-results/*"

      - name:  Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ github.event.repository.name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
